<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hatches – GeoCim</title>
<style>
  body { font-family:'IBM Plex Mono',monospace; background:#f4f6fa; padding:32px; }
  h2   { color:#1b2330; margin-bottom:12px; font-size:13px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:760px; }
  .card {
    background:white; border-radius:8px; border:2px solid #d0d5de;
    padding:8px 8px 6px; display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer; transition:border-color .12s, box-shadow .12s; user-select:none;
    position:relative;
  }
  .card:hover { border-color:#1f6fd6; box-shadow:0 0 0 3px rgba(31,111,214,.12); }
  .card.sel   { border-color:#1f6fd6; box-shadow:0 0 0 3px rgba(31,111,214,.22); background:#f0f6ff; }
  .card.sel .lbl { color:#1f6fd6; }
  .card.sel .chk { display:flex; }
  .chk {
    display:none; position:absolute; top:5px; right:6px;
    width:18px; height:18px; border-radius:50%; background:#1f6fd6;
    align-items:center; justify-content:center;
  }
  .chk svg { width:11px; height:11px; }
  .swatch { width:100%; height:68px; border-radius:4px; overflow:hidden; border:1px solid rgba(0,0,0,.08); }
  .swatch svg { display:block; width:100%; height:68px; }
  .lbl { font-size:10.5px; color:#1b2330; font-weight:600; text-align:center; }
</style>
<script>
function sel(el){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}
</script>
</head>
<body>
<h2>Tipo de suelo</h2>
<div class="grid">

<!-- 1 -->
<div class="card" onclick="sel(this)">
  <div class="chk"><svg viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="swatch"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 68" preserveAspectRatio="xMidYMid slice">
    <defs><pattern id="h01" patternUnits="userSpaceOnUse" width="12" height="6">
      <rect width="12" height="6" fill="#b0c4d8"/>
      <line x1="0" y1="3" x2="12" y2="3" stroke="#4a6a80" stroke-width="1"/>
    </pattern></defs>
    <rect width="160" height="68" fill="url(#h01)"/>
  </svg></div>
  <div class="lbl">Limo</div>
</div>
